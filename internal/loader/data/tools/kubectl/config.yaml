name: kubectl
description: Kubernetes CLI
github: github.com/kubernetes/kubectl
version_cmd: kubectl version --client --short
categories:
  - name: Pods
    bindings:
      - key: "kubectl get pods"
        desc: list pods in current namespace
      - key: "kubectl get pods -A"
        desc: list pods in all namespaces
      - key: "kubectl describe pod <name>"
        desc: show pod details
      - key: "kubectl logs <pod>"
        desc: view pod logs
      - key: "kubectl logs -f <pod>"
        desc: follow pod logs
      - key: "kubectl logs <pod> -c <container>"
        desc: logs from specific container
      - key: "kubectl exec -it <pod> -- sh"
        desc: open shell in pod
      - key: "kubectl delete pod <name>"
        desc: delete a pod
      - key: "kubectl port-forward <pod> <lport>:<rport>"
        desc: forward port to local machine

  - name: Deployments
    bindings:
      - key: "kubectl get deployments"
        desc: list deployments
      - key: "kubectl describe deploy <name>"
        desc: show deployment details
      - key: "kubectl rollout status deploy/<name>"
        desc: check rollout status
      - key: "kubectl rollout undo deploy/<name>"
        desc: undo last rollout
      - key: "kubectl scale deploy/<name> --replicas=<n>"
        desc: scale a deployment
      - key: "kubectl set image deploy/<name> <c>=<img>"
        desc: update container image

  - name: Services & Config
    bindings:
      - key: "kubectl get services"
        desc: list services
      - key: "kubectl get configmaps"
        desc: list config maps
      - key: "kubectl get secrets"
        desc: list secrets
      - key: "kubectl apply -f <file>"
        desc: apply manifest from file
      - key: "kubectl delete -f <file>"
        desc: delete resources from file
      - key: "kubectl edit <resource> <name>"
        desc: edit resource in editor

  - name: Context & Namespace
    bindings:
      - key: "kubectl config get-contexts"
        desc: list contexts
      - key: "kubectl config use-context <name>"
        desc: switch context
      - key: "kubectl config current-context"
        desc: show current context
      - key: "kubectl -n <ns> get pods"
        desc: pods in specific namespace
      - key: "kubectl config set-context --current --namespace=<ns>"
        desc: set default namespace

  - name: Debugging
    bindings:
      - key: "kubectl get events"
        desc: list cluster events
      - key: "kubectl top pods"
        desc: show pod CPU/memory usage
      - key: "kubectl top nodes"
        desc: show node CPU/memory usage
      - key: "kubectl run tmp --rm -it --image=busybox -- sh"
        desc: quick debug pod
