name: fzf
description: Fuzzy finder for terminal
github: github.com/junegunn/fzf
categories:
  - name: Navigation
    bindings:
      - key: "Ctrl+j / Ctrl+n"
        desc: move down in list
      - key: "Ctrl+k / Ctrl+p"
        desc: move up in list
      - key: "Ctrl+d / Ctrl+u"
        desc: scroll half page down / up
      - key: "Ctrl+f / Ctrl+b"
        desc: scroll page down / up
      - key: "Page Down / Up"
        desc: scroll page down / up

  - name: Selection
    bindings:
      - key: "Tab"
        desc: toggle select + move down
      - key: "Shift+Tab"
        desc: toggle select + move up
      - key: "Ctrl+a"
        desc: select all
      - key: "Ctrl+d"
        desc: deselect all

  - name: Actions
    bindings:
      - key: "Enter"
        desc: confirm selection
      - key: "Esc / Ctrl+c"
        desc: cancel / quit
      - key: "Ctrl+/"
        desc: toggle sort
      - key: "Ctrl+r"
        desc: toggle regex mode
      - key: "Ctrl+s"
        desc: toggle sort

  - name: Preview
    bindings:
      - key: "Ctrl+space"
        desc: toggle preview window
      - key: "Shift+↑ / Shift+↓"
        desc: scroll preview up / down
      - key: "?"
        desc: toggle preview (if bound)

  - name: Search syntax
    bindings:
      - key: "term"
        desc: fuzzy match
      - key: "'term"
        desc: exact match
      - key: "^term"
        desc: prefix exact match
      - key: "term$"
        desc: suffix exact match
      - key: "!term"
        desc: inverse fuzzy match
      - key: "!^term"
        desc: inverse prefix match
      - key: "term1 | term2"
        desc: OR operator

command_groups:
  - name: Examples
    commands:
      - cmd: "fzf"
        desc: Launch interactive fuzzy finder on stdin
      - cmd: "fzf --preview 'cat {}'"
        desc: Fuzzy finder with file preview
      - cmd: "fzf --multi"
        desc: Enable multi-selection mode
      - cmd: "fzf --reverse"
        desc: Display list from top (reversed layout)
      - cmd: "fzf --height 40%"
        desc: Use only 40% of terminal height
      - cmd: "find . -type f | fzf"
        desc: Fuzzy search over all files recursively
      - cmd: "git branch | fzf | xargs git checkout"
        desc: Interactively checkout a git branch
      - cmd: "history | fzf --tac | sed 's/^ *[0-9]* *//' | xargs -I{} bash -c '{}'"
        desc: Fuzzy search shell history and re-run a command
