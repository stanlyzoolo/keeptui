name: docker
description: Container platform
github: github.com/docker/cli
version_cmd: docker --version
categories:
  - name: Containers
    bindings:
      - key: "docker run <image>"
        desc: run a container
      - key: "docker run -it <image>"
        desc: run interactively with a terminal
      - key: "docker run -d <image>"
        desc: run in detached mode
      - key: "docker ps"
        desc: list running containers
      - key: "docker ps -a"
        desc: list all containers (including stopped)
      - key: "docker stop <id>"
        desc: stop a container
      - key: "docker start <id>"
        desc: start a stopped container
      - key: "docker rm <id>"
        desc: remove a container
      - key: "docker exec -it <id> sh"
        desc: open shell inside running container
      - key: "docker logs <id>"
        desc: view container logs
      - key: "docker logs -f <id>"
        desc: follow container logs
      - key: "docker inspect <id>"
        desc: show container details

  - name: Images
    bindings:
      - key: "docker images"
        desc: list local images
      - key: "docker pull <image>"
        desc: pull an image from registry
      - key: "docker push <image>"
        desc: push an image to registry
      - key: "docker build -t <name> ."
        desc: build image from Dockerfile
      - key: "docker rmi <image>"
        desc: remove an image
      - key: "docker tag <src> <dst>"
        desc: tag an image
      - key: "docker image prune"
        desc: remove unused images

  - name: Volumes & Networks
    bindings:
      - key: "docker volume ls"
        desc: list volumes
      - key: "docker volume create <name>"
        desc: create a volume
      - key: "docker volume rm <name>"
        desc: remove a volume
      - key: "docker network ls"
        desc: list networks
      - key: "docker network create <name>"
        desc: create a network

  - name: Docker Compose
    bindings:
      - key: "docker compose up"
        desc: start services
      - key: "docker compose up -d"
        desc: start services in background
      - key: "docker compose down"
        desc: stop and remove containers
      - key: "docker compose ps"
        desc: list service containers
      - key: "docker compose logs -f"
        desc: follow service logs
      - key: "docker compose build"
        desc: build service images
      - key: "docker compose exec <svc> sh"
        desc: open shell in service container

  - name: Cleanup
    bindings:
      - key: "docker system prune"
        desc: remove all unused objects
      - key: "docker system prune -a"
        desc: remove all unused objects including images
      - key: "docker container prune"
        desc: remove stopped containers
