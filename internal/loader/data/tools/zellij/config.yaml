name: zellij
description: Terminal workspace and multiplexer
github: github.com/zellij-org/zellij
version_cmd: zellij --version
categories:
  - name: Panes
    bindings:
      - key: "Ctrl+p n"
        desc: new pane
      - key: "Ctrl+p d"
        desc: new pane down
      - key: "Ctrl+p r"
        desc: new pane right
      - key: "Ctrl+p h/j/k/l"
        desc: move focus left/down/up/right
      - key: "Ctrl+p x"
        desc: close focused pane
      - key: "Ctrl+p f"
        desc: toggle pane fullscreen
      - key: "Ctrl+p z"
        desc: toggle pane frames
      - key: "Ctrl+p w"
        desc: toggle floating panes
      - key: "Ctrl+p e"
        desc: embed floating pane / float embedded

  - name: Tabs
    bindings:
      - key: "Ctrl+t n"
        desc: new tab
      - key: "Ctrl+t h / l"
        desc: previous / next tab
      - key: "Ctrl+t r"
        desc: rename tab
      - key: "Ctrl+t x"
        desc: close tab
      - key: "Ctrl+t s"
        desc: toggle sync to all panes in tab

  - name: Resize
    bindings:
      - key: "Ctrl+n h/j/k/l"
        desc: resize pane left/down/up/right
      - key: "Ctrl+n +"
        desc: increase pane size
      - key: "Ctrl+n -"
        desc: decrease pane size

  - name: Scroll
    bindings:
      - key: "Ctrl+s j / k"
        desc: scroll down / up
      - key: "Ctrl+s d / u"
        desc: scroll half page down / up
      - key: "Ctrl+s /"
        desc: search in scrollback
      - key: "Ctrl+s n / p"
        desc: next / previous search result
      - key: "Ctrl+s e"
        desc: edit scrollback in $EDITOR

  - name: Session
    bindings:
      - key: "Ctrl+o w"
        desc: session manager
      - key: "Ctrl+o d"
        desc: detach session
      - key: "Ctrl+o s"
        desc: switch session
      - key: "Ctrl+q"
        desc: quit zellij

  - name: Move panes
    bindings:
      - key: "Ctrl+h h/j/k/l"
        desc: move pane left/down/up/right
