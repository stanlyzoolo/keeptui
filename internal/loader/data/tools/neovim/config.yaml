name: neovim
description: Hyperextensible Vim-based text editor
github: github.com/neovim/neovim
version_cmd: nvim --version
categories:
  - name: Navigation
    bindings:
      - key: "h / l"
        desc: move left / right
      - key: "j / k"
        desc: move down / up
      - key: "w / b"
        desc: next / previous word
      - key: "e"
        desc: end of word
      - key: "0 / $"
        desc: line start / end
      - key: "gg / G"
        desc: file start / end
      - key: "Ctrl+u / Ctrl+d"
        desc: scroll half-page up / down
      - key: "Ctrl+o / Ctrl+i"
        desc: jump back / forward
      - key: "%"
        desc: jump to matching bracket
      - key: "f<char>"
        desc: find character forward on line
      - key: "t<char>"
        desc: till character forward on line

  - name: Insert mode
    bindings:
      - key: "i"
        desc: insert before cursor
      - key: "a"
        desc: insert after cursor
      - key: "I"
        desc: insert at line start
      - key: "A"
        desc: insert at line end
      - key: "o / O"
        desc: new line below / above
      - key: "s"
        desc: delete char and insert
      - key: "Esc / Ctrl+["
        desc: back to normal mode

  - name: Editing
    bindings:
      - key: "x"
        desc: delete character
      - key: "dd"
        desc: delete line
      - key: "dw"
        desc: delete word
      - key: "d$"
        desc: delete to end of line
      - key: "yy"
        desc: yank line
      - key: "yw"
        desc: yank word
      - key: "p / P"
        desc: paste after / before
      - key: "u"
        desc: undo
      - key: "Ctrl+r"
        desc: redo
      - key: "."
        desc: repeat last change
      - key: "ciw"
        desc: change inner word
      - key: "cit"
        desc: change inner tag

  - name: Visual mode
    bindings:
      - key: "v"
        desc: visual (character)
      - key: "V"
        desc: visual line
      - key: "Ctrl+v"
        desc: visual block
      - key: ">"
        desc: indent selection
      - key: "<"
        desc: dedent selection
      - key: "y"
        desc: yank selection
      - key: "d"
        desc: delete selection

  - name: Search & Replace
    bindings:
      - key: "/"
        desc: search forward
      - key: "?"
        desc: search backward
      - key: "n / N"
        desc: next / previous match
      - key: "*"
        desc: search word under cursor
      - key: ":%s/old/new/g"
        desc: replace all in file
      - key: ":s/old/new/g"
        desc: replace in selection

  - name: Windows & Tabs
    bindings:
      - key: ":sp"
        desc: horizontal split
      - key: ":vsp"
        desc: vertical split
      - key: "Ctrl+w h/j/k/l"
        desc: navigate between splits
      - key: "Ctrl+w ="
        desc: equalize split sizes
      - key: ":tabnew"
        desc: new tab
      - key: "gt / gT"
        desc: next / previous tab

  - name: Commands
    bindings:
      - key: ":"
        desc: command mode
      - key: ":w"
        desc: save
      - key: ":q"
        desc: quit
      - key: ":wq / ZZ"
        desc: save and quit
      - key: ":q! / ZQ"
        desc: quit without saving
      - key: ":e <file>"
        desc: open file
      - key: ":ls"
        desc: list buffers
      - key: ":b <n>"
        desc: switch buffer
