name: micro
description: Modern terminal text editor
github: github.com/zyedidia/micro
categories:
  - name: Navigation
    bindings:
      - key: "Ctrl+←/→"
        desc: move word left / right
      - key: "Ctrl+Home/End"
        desc: go to start / end of file
      - key: "Home / End"
        desc: go to start / end of line
      - key: "Ctrl+g"
        desc: go to line number
      - key: "Ctrl+l"
        desc: jump to line

  - name: Editing
    bindings:
      - key: "Ctrl+z"
        desc: undo
      - key: "Ctrl+y"
        desc: redo
      - key: "Ctrl+d"
        desc: duplicate line
      - key: "Ctrl+k"
        desc: cut line
      - key: "Tab"
        desc: indent selection
      - key: "Shift+Tab"
        desc: unindent selection
      - key: "Alt+↑ / Alt+↓"
        desc: move line up / down

  - name: Selection
    bindings:
      - key: "Shift+arrows"
        desc: extend selection
      - key: "Ctrl+a"
        desc: select all
      - key: "Alt+m"
        desc: spawn cursor at next match

  - name: Clipboard
    bindings:
      - key: "Ctrl+c"
        desc: copy
      - key: "Ctrl+x"
        desc: cut
      - key: "Ctrl+v"
        desc: paste

  - name: File
    bindings:
      - key: "Ctrl+s"
        desc: save
      - key: "Ctrl+shift+s"
        desc: save as
      - key: "Ctrl+q"
        desc: quit
      - key: "Ctrl+o"
        desc: open file

  - name: Search & Replace
    bindings:
      - key: "Ctrl+f"
        desc: find
      - key: "Ctrl+h"
        desc: find and replace
      - key: "Ctrl+n"
        desc: next match
      - key: "Ctrl+p"
        desc: previous match

  - name: Multiple cursors
    bindings:
      - key: "Ctrl+e"
        desc: execute command
      - key: "Alt+n"
        desc: spawn cursor at next match
      - key: "Alt+l"
        desc: spawn cursor at each line in selection

  - name: Tabs & Splits
    bindings:
      - key: "Ctrl+t"
        desc: new tab
      - key: "Alt+,"
        desc: previous tab
      - key: "Alt+."
        desc: next tab
      - key: "Ctrl+w"
        desc: switch split
