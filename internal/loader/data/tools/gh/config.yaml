name: gh
description: GitHub CLI
github: github.com/cli/cli
version_cmd: gh --version
categories:
  - name: Pull Requests
    bindings:
      - key: "gh pr list"
        desc: list pull requests
      - key: "gh pr create"
        desc: create a pull request
      - key: "gh pr view [<number>]"
        desc: view a pull request
      - key: "gh pr checkout <number>"
        desc: check out a pull request locally
      - key: "gh pr merge [<number>]"
        desc: merge a pull request
      - key: "gh pr close <number>"
        desc: close a pull request
      - key: "gh pr review"
        desc: add a review to a pull request
      - key: "gh pr diff [<number>]"
        desc: view changes in a pull request
      - key: "gh pr status"
        desc: show status of pull requests for current branch

  - name: Issues
    bindings:
      - key: "gh issue list"
        desc: list issues
      - key: "gh issue create"
        desc: create a new issue
      - key: "gh issue view <number>"
        desc: view an issue
      - key: "gh issue close <number>"
        desc: close an issue
      - key: "gh issue comment <number>"
        desc: add a comment to an issue
      - key: "gh issue edit <number>"
        desc: edit an issue
      - key: "gh issue pin <number>"
        desc: pin an issue

  - name: Repos
    bindings:
      - key: "gh repo clone <repo>"
        desc: clone a repository
      - key: "gh repo create"
        desc: create a new repository
      - key: "gh repo fork"
        desc: fork a repository
      - key: "gh repo view"
        desc: view repository info
      - key: "gh repo list [<owner>]"
        desc: list repositories

  - name: Workflow & CI
    bindings:
      - key: "gh run list"
        desc: list workflow runs
      - key: "gh run view [<run-id>]"
        desc: view a workflow run
      - key: "gh run watch [<run-id>]"
        desc: watch a workflow run until it finishes
      - key: "gh workflow list"
        desc: list workflows
      - key: "gh workflow run <workflow>"
        desc: trigger a workflow

  - name: Other
    bindings:
      - key: "gh auth login"
        desc: authenticate with GitHub
      - key: "gh auth status"
        desc: show auth status
      - key: "gh gist create <file>"
        desc: create a gist
      - key: "gh release create <tag>"
        desc: create a release
      - key: "gh release list"
        desc: list releases
      - key: "gh browse"
        desc: open repo in browser
      - key: "gh search repos <query>"
        desc: search GitHub repositories
