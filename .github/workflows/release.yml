name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Release via GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GoReleaser needs full history + tags for the changelog.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          # Cuts the GitHub Release in this repo.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pushes the updated formula to stanlyzoolo/homebrew-apps.
          # Must be a PAT (classic: repo scope, or fine-grained: Contents RW
          # on homebrew-apps) — the default GITHUB_TOKEN can't push to another repo.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
