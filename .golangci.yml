version: "2"

# Minimal config: the standard set (errcheck, govet, ineffassign, staticcheck,
# unused). Add linters deliberately, one at a time, with the noise cleaned up.
linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        # `defer resp.Body.Close()` is the standard idiom; the error is
        # meaningless on a read-side close.
        - (io.ReadCloser).Close
    staticcheck:
      checks:
        - all
        # golangci-lint's own defaults for staticcheck:
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        # QF1003 (use tagged switch) fires on the focus if-chains in
        # model.go Update(), which the mode-enum refactor rewrites; a
        # switch-vs-if style nudge is not worth churn elsewhere either.
        - -QF1003
